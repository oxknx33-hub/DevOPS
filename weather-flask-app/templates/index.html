<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парсер погоды</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        .city-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .city-btn { background: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Парсер погоды</h1>
    <p>Введите координаты или выберите город из списка:</p>
    
    <form action="/weather" method="get">
    	<div class="form-group">
        	<label for="city">Or enter city:</label>
        	<input type="text" id="city" placeholder="Example: Kazan">
        	<button type="button" onclick="fetchCoords()" style="margin-top:5px;">Get Coords</button>
    	</div>
    	<div class="form-group">
       	 	<label for="lat">Latitude:</label>
        	<input type="text" id="lat" name="lat" placeholder="55.7558" required>
    	</div>
    	<div class="form-group">
        	<label for="lon">Longitude:</label>
        	<input type="text" id="lon" name="lon" placeholder="37.6173" required>
    	</div>
    	<button type="submit">Get Weather</button>
	</form>

	<script>
	function fetchCoords() {
    		const city = document.getElementById('city').value;
    		if (!city) return alert('Enter city name');
    
    	fetch(`/api/get-coords?city=${encodeURIComponent(city)}`)
        	.then(r => r.json())
        	.then(data => {
            		if (data.lat && data.lon) {
                		document.getElementById('lat').value = data.lat;
                		document.getElementById('lon').value = data.lon;
                		if (data.name) document.getElementById('city').value = data.name;
            		} else {
                		alert('Error: ' + (data.error || 'Coords not found'));
            		}
        	})
        	.catch(() => alert('Request failed'));
	}
	</script>

    <div class="city-list">
        <button class="city-btn" onclick="setCoords(55.7558, 37.6173)">Москва</button>
        <button class="city-btn" onclick="setCoords(59.9343, 30.3351)">Санкт-Петербург</button>
        <button class="city-btn" onclick="setCoords(51.5074, -0.1278)">Лондон</button>
        <button class="city-btn" onclick="setCoords(40.7128, -74.0060)">Нью-Йорк</button>
        <button class="city-btn" onclick="setCoords(35.6762, 139.6503)">Токио</button>
    </div>

    <script>
        function setCoords(lat, lon) {
            document.getElementById('lat').value = lat;
            document.getElementById('lon').value = lon;
        }
    </script>
</body>
</html>
